server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/library_reservation?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: root
    password: 123456
  
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

  # 定时任务配置
  task:
    scheduling:
      pool:
        size: 2
      thread-name-prefix: library-task-

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

# MyBatis Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

# 日志配置
logging:
  level:
    com.library: debug
    root: info

# AI助手配置（通义千问）
ai:
  # API Key - 请替换为您在阿里云获取的真实API Key
  api-key: ${AI_API_KEY:sk-9e9a348942014f09ab83cf389c4a54d6}
  # 模型名称（qwen-turbo/qwen-plus/qwen-max等）
  model: ${AI_MODEL:qwen-plus}
  # API地址
  api-url: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions

